<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Developer -->
  <circle cx="60" cy="100" r="20" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="120" x2="60" y2="170" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="140" x2="35" y2="155" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="140" x2="85" y2="155" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="170" x2="35" y2="200" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="170" x2="85" y2="200" stroke="#333" stroke-width="2"/>
  <text x="60" y="225" text-anchor="middle" font-size="13" fill="#333">Developer</text>

  <!-- IDE + LLM -->
  <rect x="130" y="50" width="190" height="160" rx="8" fill="#e8eaf6" stroke="#3F51B5" stroke-width="2"/>
  <text x="225" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#283593">Any IDE + LLM</text>
  <rect x="150" y="93" width="150" height="35" rx="5" fill="#fff" stroke="#9FA8DA" stroke-width="1.5"/>
  <text x="225" y="115" text-anchor="middle" font-size="12" fill="#303F9F">AI Agent</text>
  <rect x="150" y="138" width="150" height="55" rx="5" fill="#fff" stroke="#9FA8DA" stroke-width="1.5"/>
  <text x="225" y="160" text-anchor="middle" font-size="12" fill="#303F9F">Local Files</text>
  <text x="225" y="178" text-anchor="middle" font-size="11" fill="#888">(ABAP source code)</text>

  <!-- Arrow: Developer to IDE -->
  <line x1="95" y1="130" x2="125" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arrow5)"/>

  <!-- Git Repository -->
  <rect x="380" y="50" width="170" height="160" rx="8" fill="#fce4ec" stroke="#E91E63" stroke-width="2"/>
  <text x="465" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#880E4F">Git Repository</text>
  <rect x="400" y="95" width="130" height="35" rx="4" fill="#fff" stroke="#F48FB1" stroke-width="1.5"/>
  <text x="465" y="117" text-anchor="middle" font-size="12" fill="#C2185B">Source Code</text>
  <rect x="400" y="140" width="130" height="30" rx="4" fill="#fff" stroke="#F48FB1" stroke-width="1.5"/>
  <text x="465" y="160" text-anchor="middle" font-size="12" fill="#C2185B">Pull Requests</text>
  <rect x="400" y="178" width="130" height="25" rx="4" fill="#fff" stroke="#F48FB1" stroke-width="1.5"/>
  <text x="465" y="195" text-anchor="middle" font-size="11" fill="#C2185B">Code Reviews</text>

  <!-- Arrow: IDE to Git -->
  <line x1="325" y1="130" x2="375" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <text x="350" y="120" text-anchor="middle" font-size="11" fill="#888">git push</text>

  <!-- CI/CD Pipeline -->
  <rect x="380" y="240" width="170" height="80" rx="8" fill="#e0f2f1" stroke="#009688" stroke-width="2"/>
  <text x="465" y="265" text-anchor="middle" font-size="13" font-weight="bold" fill="#00695C">CI / CD</text>
  <text x="465" y="283" text-anchor="middle" font-size="11" fill="#00796B">Static Analysis</text>
  <text x="465" y="300" text-anchor="middle" font-size="11" fill="#00796B">Unit Tests</text>

  <!-- Arrow: Git to CI -->
  <line x1="465" y1="215" x2="465" y2="235" stroke="#555" stroke-width="1.5" marker-end="url(#arrow5)"/>

  <!-- SAP System -->
  <rect x="610" y="110" width="170" height="120" rx="8" fill="#fff3e0" stroke="#FF9800" stroke-width="2"/>
  <text x="695" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">SAP System</text>
  <rect x="625" y="155" width="140" height="30" rx="4" fill="#fff" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="695" y="175" text-anchor="middle" font-size="12" fill="#F57C00">ABAP Objects</text>
  <rect x="625" y="193" width="140" height="25" rx="4" fill="#fff" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="695" y="210" text-anchor="middle" font-size="11" fill="#F57C00">abapGit</text>

  <!-- Arrow: Git to SAP via abapGit -->
  <line x1="555" y1="140" x2="605" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrow5)"/>
  <text x="595" y="133" text-anchor="middle" font-size="11" fill="#888">abapGit</text>

  <!-- Human review gate -->
  <circle cx="590" cy="87" r="15" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="590" y1="63" x2="590" y2="72" stroke="#333" stroke-width="1.5"/>
  <text x="590" y="57" text-anchor="middle" font-size="11" fill="#333">Human in</text>
  <text x="590" y="45" text-anchor="middle" font-size="11" fill="#333">the loop</text>

  <!-- Low risk label -->
  <rect x="610" y="245" width="170" height="30" rx="4" fill="#e8f5e9" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="695" y="265" text-anchor="middle" font-size="12" fill="#2E7D32">Low risk: gated access</text>

  <!-- CI feedback arrow back to IDE -->
  <path d="M 380 280 L 225 280 L 225 215" fill="none" stroke="#009688" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow5)"/>
  <text x="300" y="272" text-anchor="middle" font-size="10" fill="#009688">Feedback to LLM</text>
</svg>