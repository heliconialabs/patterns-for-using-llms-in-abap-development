<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Developer -->
  <circle cx="60" cy="120" r="20" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="140" x2="60" y2="190" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="160" x2="35" y2="175" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="160" x2="85" y2="175" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="190" x2="35" y2="220" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="190" x2="85" y2="220" stroke="#333" stroke-width="2"/>
  <text x="60" y="245" text-anchor="middle" font-size="13" fill="#333">Developer</text>

  <!-- IDE + LLM -->
  <rect x="140" y="70" width="190" height="140" rx="8" fill="#e8eaf6" stroke="#3F51B5" stroke-width="2"/>
  <text x="235" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#283593">IDE + LLM</text>
  <rect x="160" y="115" width="150" height="35" rx="5" fill="#fff" stroke="#9FA8DA" stroke-width="1.5"/>
  <text x="235" y="137" text-anchor="middle" font-size="12" fill="#303F9F">AI Agent</text>
  <rect x="160" y="160" width="150" height="35" rx="5" fill="#fff" stroke="#9FA8DA" stroke-width="1.5"/>
  <text x="235" y="182" text-anchor="middle" font-size="12" fill="#303F9F">MCP / Virtual FS</text>

  <!-- Arrow: Developer to IDE -->
  <line x1="95" y1="145" x2="135" y2="145" stroke="#555" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <!-- Sandbox System -->
  <rect x="400" y="30" width="240" height="190" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="520" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">Sandbox System</text>
  <text x="520" y="75" text-anchor="middle" font-size="11" fill="#558B2F">(isolated / resettable)</text>
  <rect x="420" y="90" width="200" height="35" rx="4" fill="#fff" stroke="#A5D6A7" stroke-width="1.5"/>
  <text x="520" y="112" text-anchor="middle" font-size="12" fill="#388E3C">ABAP Objects</text>
  <rect x="420" y="135" width="200" height="35" rx="4" fill="#fff" stroke="#A5D6A7" stroke-width="1.5"/>
  <text x="520" y="157" text-anchor="middle" font-size="12" fill="#388E3C">Test Data</text>
  <rect x="420" y="180" width="200" height="30" rx="4" fill="#c8e6c9" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="520" y="200" text-anchor="middle" font-size="11" fill="#2E7D32">Low risk: isolated</text>

  <!-- Arrow: IDE to Sandbox -->
  <line x1="335" y1="145" x2="395" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <text x="365" y="125" text-anchor="middle" font-size="11" fill="#888">ADT</text>

  <!-- Main SAP System -->
  <rect x="400" y="240" width="240" height="80" rx="8" fill="#fff3e0" stroke="#FF9800" stroke-width="2"/>
  <text x="520" y="268" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">Main SAP System</text>
  <text x="520" y="290" text-anchor="middle" font-size="11" fill="#888">Production / central dev</text>
  <text x="520" y="308" text-anchor="middle" font-size="11" fill="#E65100">No direct LLM access</text>

  <!-- Arrow: Sandbox to Main (manual) -->
  <line x1="520" y1="225" x2="520" y2="235" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow4)"/>
  <text x="610" y="235" text-anchor="middle" font-size="11" fill="#888">Manual transport</text>

  <!-- Human review -->
  <circle cx="720" cy="265" r="15" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="720" y1="280" x2="720" y2="310" stroke="#333" stroke-width="1.5"/>
  <line x1="720" y1="290" x2="705" y2="300" stroke="#333" stroke-width="1.5"/>
  <line x1="720" y1="290" x2="735" y2="300" stroke="#333" stroke-width="1.5"/>
  <text x="720" y="330" text-anchor="middle" font-size="11" fill="#333">Review</text>

  <!-- Arrow: Human to Main -->
  <line x1="700" y1="280" x2="645" y2="280" stroke="#555" stroke-width="1.5" marker-end="url(#arrow4)"/>
</svg>