<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 300" width="750" height="300" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow2b" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Developer -->
  <circle cx="60" cy="120" r="20" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="140" x2="60" y2="190" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="160" x2="35" y2="175" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="160" x2="85" y2="175" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="190" x2="35" y2="220" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="190" x2="85" y2="220" stroke="#333" stroke-width="2"/>
  <text x="60" y="245" text-anchor="middle" font-size="13" fill="#333">Developer</text>

  <!-- VS Code IDE -->
  <rect x="140" y="70" width="200" height="160" rx="8" fill="#f3e5f5" stroke="#9C27B0" stroke-width="2"/>
  <text x="240" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#6A1B9A">VS Code</text>
  <rect x="160" y="115" width="160" height="35" rx="5" fill="#fff" stroke="#CE93D8" stroke-width="1.5"/>
  <text x="240" y="137" text-anchor="middle" font-size="12" fill="#7B1FA2">LLM / AI Assistant</text>
  <rect x="160" y="160" width="160" height="50" rx="5" fill="#fff" stroke="#CE93D8" stroke-width="1.5"/>
  <text x="240" y="182" text-anchor="middle" font-size="12" fill="#7B1FA2">ABAP Remote FS</text>
  <text x="240" y="198" text-anchor="middle" font-size="11" fill="#888">(Virtual File System)</text>

  <!-- Arrow: Developer to IDE -->
  <line x1="95" y1="150" x2="135" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Arrow: IDE to SAP -->
  <line x1="345" y1="150" x2="440" y2="150" stroke="#555" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="393" y="140" text-anchor="middle" font-size="11" fill="#888">ADT REST</text>
  <text x="393" y="155" text-anchor="middle" font-size="11" fill="#888">APIs</text>

  <!-- SAP System -->
  <rect x="445" y="70" width="260" height="160" rx="8" fill="#fff3e0" stroke="#FF9800" stroke-width="2"/>
  <text x="575" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">SAP System (7.31+)</text>
  <rect x="465" y="115" width="220" height="35" rx="4" fill="#fff" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="575" y="137" text-anchor="middle" font-size="12" fill="#F57C00">ADT Backend Services</text>
  <rect x="465" y="160" width="220" height="35" rx="4" fill="#fff" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="575" y="182" text-anchor="middle" font-size="12" fill="#F57C00">ABAP Objects</text>

  <!-- Risk label -->
  <rect x="445" y="245" width="260" height="30" rx="4" fill="#ffebee" stroke="#ef5350" stroke-width="1.5"/>
  <text x="575" y="265" text-anchor="middle" font-size="12" fill="#c62828">Direct write access to system</text>
</svg>