<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 575" width="1000" height="575" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ov-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#555"/>
    </marker>
    <marker id="ov-arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#888"/>
    </marker>
    <marker id="ov-arr-teal" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#009688"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="490" y="23" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Patterns for Using LLMs in ABAP Development — Overview</text>

  <!-- Risk zone: high (rows 1-3) -->
  <rect x="0" y="35" width="980" height="286" fill="#fff8f8"/>
  <!-- Risk zone: low (rows 4-5) -->
  <rect x="0" y="321" width="980" height="240" fill="#f8fff8"/>
  <!-- Divider -->
  <line x1="0" y1="321" x2="980" y2="321" stroke="#ddd" stroke-width="1.5" stroke-dasharray="8,5"/>
  <!-- Zone labels -->
  <text x="9" y="47" font-size="10" fill="#c62828" opacity="0.75">HIGH RISK — direct write access to SAP system</text>
  <text x="9" y="333" font-size="10" fill="#2E7D32" opacity="0.75">LOW RISK — gated access</text>

  <!-- ===== DEVELOPER ===== -->
  <circle cx="44" cy="268" r="17" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="44" y1="285" x2="44" y2="322" stroke="#333" stroke-width="2"/>
  <line x1="44" y1="300" x2="27" y2="312" stroke="#333" stroke-width="2"/>
  <line x1="44" y1="300" x2="61" y2="312" stroke="#333" stroke-width="2"/>
  <line x1="44" y1="322" x2="27" y2="340" stroke="#333" stroke-width="2"/>
  <line x1="44" y1="322" x2="61" y2="340" stroke="#333" stroke-width="2"/>
  <text x="44" y="356" text-anchor="middle" font-size="11" fill="#333">Developer</text>

  <!-- Connector lines from dev to each row start -->
  <line x1="61" y1="260" x2="102" y2="85"  stroke="#ccc" stroke-width="1.5"/>
  <line x1="61" y1="264" x2="102" y2="175" stroke="#ccc" stroke-width="1.5"/>
  <line x1="62" y1="268" x2="102" y2="265" stroke="#ccc" stroke-width="1.5"/>
  <line x1="61" y1="285" x2="102" y2="393" stroke="#ccc" stroke-width="1.5"/>
  <line x1="61" y1="295" x2="102" y2="490" stroke="#ccc" stroke-width="1.5"/>

  <!-- ===== ROW 1: SE80 / Eclipse (y=85) ===== -->
  <rect x="104" y="63" width="188" height="44" rx="6" fill="#e8f4fd" stroke="#2196F3" stroke-width="2"/>
  <text x="198" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">SE80 / Eclipse</text>
  <text x="198" y="98" text-anchor="middle" font-size="10" fill="#555">Joule · Developer Q · Kiro</text>
  <!-- Arrow to SAP -->
  <line x1="294" y1="85" x2="575" y2="128" stroke="#555" stroke-width="1.5" marker-end="url(#ov-arr)"/>
  <text x="438" y="93" text-anchor="middle" font-size="10" fill="#777">RFC / API</text>

  <!-- ===== ROW 2: Virtual FS via ADT (y=175) ===== -->
  <rect x="104" y="153" width="188" height="44" rx="6" fill="#f3e5f5" stroke="#9C27B0" stroke-width="2"/>
  <text x="198" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#6A1B9A">Virtual FS via ADT</text>
  <text x="198" y="188" text-anchor="middle" font-size="10" fill="#555">ABAP Remote FS · VS Code</text>
  <!-- Arrow to SAP -->
  <line x1="294" y1="175" x2="575" y2="185" stroke="#555" stroke-width="1.5" marker-end="url(#ov-arr)"/>
  <text x="438" y="166" text-anchor="middle" font-size="10" fill="#777">ADT REST APIs</text>

  <!-- ===== ROW 3: MCP via ADT (y=265) ===== -->
  <rect x="104" y="243" width="188" height="44" rx="6" fill="#e8eaf6" stroke="#3F51B5" stroke-width="2"/>
  <text x="198" y="262" text-anchor="middle" font-size="12" font-weight="bold" fill="#283593">MCP via ADT</text>
  <text x="198" y="278" text-anchor="middle" font-size="10" fill="#555">MCP Server · vibing-steampunk</text>
  <!-- Arrow to SAP -->
  <line x1="294" y1="265" x2="575" y2="250" stroke="#555" stroke-width="1.5" marker-end="url(#ov-arr)"/>
  <text x="438" y="248" text-anchor="middle" font-size="10" fill="#777">ADT REST APIs</text>

  <!-- ===== SAP SYSTEM (shared by rows 1-3) ===== -->
  <rect x="577" y="78" width="195" height="208" rx="8" fill="#fff3e0" stroke="#FF9800" stroke-width="2.5"/>
  <text x="675" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">SAP System</text>
  <rect x="597" y="115" width="155" height="28" rx="4" fill="#fff" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="675" y="134" text-anchor="middle" font-size="11" fill="#F57C00">ABAP Objects</text>
  <rect x="597" y="153" width="155" height="28" rx="4" fill="#fff" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="675" y="172" text-anchor="middle" font-size="11" fill="#F57C00">Transport System</text>
  <rect x="597" y="191" width="155" height="28" rx="4" fill="#fff" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="675" y="210" text-anchor="middle" font-size="11" fill="#F57C00">ADT Backend</text>
  <rect x="577" y="295" width="195" height="23" rx="4" fill="#ffebee" stroke="#ef5350" stroke-width="1.5"/>
  <text x="675" y="311" text-anchor="middle" font-size="11" fill="#c62828">Direct write access</text>

  <!-- ===== ROW 4: Sandboxed (y=393) ===== -->
  <!-- IDE+LLM -->
  <rect x="104" y="371" width="165" height="44" rx="6" fill="#e8eaf6" stroke="#3F51B5" stroke-width="2"/>
  <text x="187" y="390" text-anchor="middle" font-size="12" font-weight="bold" fill="#283593">IDE + LLM</text>
  <text x="187" y="406" text-anchor="middle" font-size="10" fill="#555">MCP / Virtual FS</text>
  <!-- Arrow to Sandbox -->
  <line x1="272" y1="393" x2="332" y2="393" stroke="#555" stroke-width="1.5" marker-end="url(#ov-arr)"/>
  <text x="302" y="385" text-anchor="middle" font-size="10" fill="#777">ADT</text>
  <!-- Sandbox box -->
  <rect x="334" y="365" width="175" height="55" rx="6" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2" stroke-dasharray="7,3"/>
  <text x="422" y="387" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Sandbox System</text>
  <text x="422" y="403" text-anchor="middle" font-size="10" fill="#555">Isolated · Resettable</text>
  <!-- Manual transport arrow (dashed) -->
  <line x1="512" y1="393" x2="574" y2="393" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ov-arr-g)"/>
  <text x="544" y="384" text-anchor="middle" font-size="10" fill="#888">Manual</text>
  <!-- SAP for sandboxed -->
  <rect x="577" y="371" width="195" height="44" rx="6" fill="#fff3e0" stroke="#FF9800" stroke-width="2"/>
  <text x="675" y="390" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">SAP System</text>
  <text x="675" y="406" text-anchor="middle" font-size="10" fill="#888">No direct LLM access</text>
  <!-- Human review figure -->
  <circle cx="848" cy="383" r="12" fill="none" stroke="#444" stroke-width="1.5"/>
  <line x1="848" y1="395" x2="848" y2="413" stroke="#444" stroke-width="1.5"/>
  <line x1="848" y1="402" x2="837" y2="409" stroke="#444" stroke-width="1.5"/>
  <line x1="848" y1="402" x2="859" y2="409" stroke="#444" stroke-width="1.5"/>
  <line x1="848" y1="413" x2="837" y2="425" stroke="#444" stroke-width="1.5"/>
  <line x1="848" y1="413" x2="859" y2="425" stroke="#444" stroke-width="1.5"/>
  <text x="848" y="438" text-anchor="middle" font-size="10" fill="#444">Review</text>
  <line x1="836" y1="387" x2="777" y2="387" stroke="#555" stroke-width="1.5" marker-end="url(#ov-arr)"/>
  <!-- Low risk label -->
  <rect x="577" y="423" width="195" height="23" rx="4" fill="#e8f5e9" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="675" y="439" text-anchor="middle" font-size="11" fill="#2E7D32">Low risk: isolated</text>

  <!-- ===== ROW 5: Git / Off-Stack (y=490) ===== -->
  <!-- IDE + local files -->
  <rect x="104" y="468" width="155" height="44" rx="6" fill="#e8eaf6" stroke="#3F51B5" stroke-width="2"/>
  <text x="182" y="487" text-anchor="middle" font-size="12" font-weight="bold" fill="#283593">Any IDE + LLM</text>
  <text x="182" y="503" text-anchor="middle" font-size="10" fill="#555">Local ABAP files</text>
  <!-- Arrow to Git -->
  <line x1="262" y1="490" x2="302" y2="490" stroke="#555" stroke-width="1.5" marker-end="url(#ov-arr)"/>
  <text x="282" y="482" text-anchor="middle" font-size="10" fill="#777">git push</text>
  <!-- Git Repo box -->
  <rect x="304" y="468" width="128" height="44" rx="6" fill="#fce4ec" stroke="#E91E63" stroke-width="2"/>
  <text x="368" y="487" text-anchor="middle" font-size="12" font-weight="bold" fill="#880E4F">Git Repo</text>
  <text x="368" y="503" text-anchor="middle" font-size="10" fill="#555">PR · Code Review</text>
  <!-- Arrow to CI/CD -->
  <line x1="435" y1="490" x2="452" y2="490" stroke="#555" stroke-width="1.5" marker-end="url(#ov-arr)"/>
  <!-- CI/CD box -->
  <rect x="454" y="468" width="105" height="44" rx="6" fill="#e0f2f1" stroke="#009688" stroke-width="2"/>
  <text x="507" y="487" text-anchor="middle" font-size="12" font-weight="bold" fill="#00695C">CI / CD</text>
  <text x="507" y="503" text-anchor="middle" font-size="10" fill="#555">Tests · Analysis</text>
  <!-- Feedback loop back to IDE -->
  <path d="M 454 512 L 182 536 L 182 516" fill="none" stroke="#009688" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ov-arr-teal)"/>
  <text x="318" y="547" text-anchor="middle" font-size="10" fill="#009688">Feedback to LLM</text>
  <!-- Arrow from CI/CD to SAP -->
  <line x1="562" y1="490" x2="586" y2="490" stroke="#555" stroke-width="1.5" marker-end="url(#ov-arr)"/>
  <text x="530" y="482" text-anchor="middle" font-size="10" fill="#777">abapGit</text>
  <!-- SAP for git/off-stack -->
  <rect x="588" y="458" width="195" height="44" rx="6" fill="#fff3e0" stroke="#FF9800" stroke-width="2"/>
  <text x="686" y="477" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">SAP System</text>
  <text x="686" y="493" text-anchor="middle" font-size="10" fill="#888">Deployed via abapGit</text>
  <!-- Human in the loop for git (PR review) -->
  <circle cx="858" cy="480" r="12" fill="none" stroke="#444" stroke-width="1.5"/>
  <line x1="858" y1="492" x2="858" y2="510" stroke="#444" stroke-width="1.5"/>
  <line x1="858" y1="499" x2="847" y2="506" stroke="#444" stroke-width="1.5"/>
  <line x1="858" y1="499" x2="869" y2="506" stroke="#444" stroke-width="1.5"/>
  <line x1="858" y1="510" x2="847" y2="522" stroke="#444" stroke-width="1.5"/>
  <line x1="858" y1="510" x2="869" y2="522" stroke="#444" stroke-width="1.5"/>
  <text x="858" y="535" text-anchor="middle" font-size="10" fill="#444">Review</text>
  <!-- Arrow from reviewer to Git Repo (PR review) -->
  <line x1="846" y1="478" x2="435" y2="478" stroke="#555" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#ov-arr)"/>
  <!-- Low risk label -->
  <rect x="588" y="510" width="195" height="23" rx="4" fill="#e8f5e9" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="686" y="526" text-anchor="middle" font-size="11" fill="#2E7D32">Low risk: gated</text>

</svg>
