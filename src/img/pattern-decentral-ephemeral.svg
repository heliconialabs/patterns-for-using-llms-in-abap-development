<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 400" width="850" height="400" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow6" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Developer -->
  <circle cx="60" cy="100" r="20" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="120" x2="60" y2="170" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="140" x2="35" y2="155" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="140" x2="85" y2="155" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="170" x2="35" y2="200" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="170" x2="85" y2="200" stroke="#333" stroke-width="2"/>
  <text x="60" y="225" text-anchor="middle" font-size="13" fill="#333">Developer</text>
  <text x="60" y="240" text-anchor="middle" font-size="11" fill="#888">+ LLM</text>

  <!-- Ephemeral ABAP System -->
  <rect x="140" y="50" width="190" height="180" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="235" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">Ephemeral ABAP</text>
  <text x="235" y="95" text-anchor="middle" font-size="11" fill="#558B2F">(personal / on-demand)</text>
  <rect x="160" y="108" width="150" height="30" rx="4" fill="#fff" stroke="#A5D6A7" stroke-width="1.5"/>
  <text x="235" y="128" text-anchor="middle" font-size="11" fill="#388E3C">ABAP Objects</text>
  <rect x="160" y="148" width="150" height="30" rx="4" fill="#fff" stroke="#A5D6A7" stroke-width="1.5"/>
  <text x="235" y="168" text-anchor="middle" font-size="11" fill="#388E3C">Test &amp; Validate</text>
  <rect x="160" y="188" width="150" height="30" rx="4" fill="#c8e6c9" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="235" y="208" text-anchor="middle" font-size="10" fill="#2E7D32">Spin up / shut down</text>

  <!-- Arrow: Developer to Ephemeral -->
  <line x1="95" y1="130" x2="135" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arrow6)"/>

  <!-- Git Repository -->
  <rect x="410" y="50" width="170" height="160" rx="8" fill="#fce4ec" stroke="#E91E63" stroke-width="2"/>
  <text x="495" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#880E4F">Git Repository</text>
  <rect x="430" y="95" width="130" height="35" rx="4" fill="#fff" stroke="#F48FB1" stroke-width="1.5"/>
  <text x="495" y="117" text-anchor="middle" font-size="12" fill="#C2185B">Source Code</text>
  <rect x="430" y="140" width="130" height="30" rx="4" fill="#fff" stroke="#F48FB1" stroke-width="1.5"/>
  <text x="495" y="160" text-anchor="middle" font-size="12" fill="#C2185B">Pull Requests</text>
  <rect x="430" y="178" width="130" height="25" rx="4" fill="#fff" stroke="#F48FB1" stroke-width="1.5"/>
  <text x="495" y="195" text-anchor="middle" font-size="11" fill="#C2185B">Code Reviews</text>

  <!-- Arrow: Ephemeral to Git -->
  <line x1="335" y1="130" x2="405" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arrow6)"/>
  <text x="370" y="120" text-anchor="middle" font-size="11" fill="#888">git push</text>

  <!-- CI/CD Pipeline with Ephemeral System -->
  <rect x="410" y="260" width="170" height="120" rx="8" fill="#e0f2f1" stroke="#009688" stroke-width="2"/>
  <text x="495" y="285" text-anchor="middle" font-size="13" font-weight="bold" fill="#00695C">CI / CD</text>
  <rect x="425" y="295" width="140" height="25" rx="4" fill="#fff" stroke="#80CBC4" stroke-width="1.5"/>
  <text x="495" y="312" text-anchor="middle" font-size="11" fill="#00796B">Static Analysis &amp; Tests</text>
  <rect x="425" y="328" width="140" height="40" rx="4" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="495" y="345" text-anchor="middle" font-size="11" fill="#2E7D32">Ephemeral ABAP</text>
  <text x="495" y="360" text-anchor="middle" font-size="10" fill="#558B2F">(isolated CI system)</text>

  <!-- Arrow: Git to CI -->
  <line x1="495" y1="215" x2="495" y2="255" stroke="#555" stroke-width="1.5" marker-end="url(#arrow6)"/>

  <!-- Main SAP System -->
  <rect x="660" y="110" width="170" height="120" rx="8" fill="#fff3e0" stroke="#FF9800" stroke-width="2"/>
  <text x="745" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">Main SAP System</text>
  <rect x="675" y="155" width="140" height="30" rx="4" fill="#fff" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="745" y="175" text-anchor="middle" font-size="12" fill="#F57C00">ABAP Objects</text>
  <rect x="675" y="193" width="140" height="25" rx="4" fill="#fff" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="745" y="210" text-anchor="middle" font-size="11" fill="#F57C00">abapGit / gCTS</text>

  <!-- Arrow: Git to SAP via abapGit -->
  <line x1="585" y1="140" x2="655" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrow6)"/>
  <text x="635" y="133" text-anchor="middle" font-size="11" fill="#888">abapGit</text>

  <!-- Human review gate -->
  <circle cx="630" cy="87" r="15" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="630" y1="63" x2="630" y2="72" stroke="#333" stroke-width="1.5"/>
  <text x="630" y="57" text-anchor="middle" font-size="11" fill="#333">Human in</text>
  <text x="630" y="45" text-anchor="middle" font-size="11" fill="#333">the loop</text>

  <!-- Low risk label -->
  <rect x="660" y="260" width="170" height="30" rx="4" fill="#e8f5e9" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="745" y="280" text-anchor="middle" font-size="12" fill="#2E7D32">Low risk: gated access</text>

  <!-- CI feedback arrow back to Ephemeral -->
  <path d="M 410 340 L 235 340 L 235 235" fill="none" stroke="#009688" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow6)"/>
  <text x="310" y="355" text-anchor="middle" font-size="10" fill="#009688">Feedback to LLM</text>
</svg>