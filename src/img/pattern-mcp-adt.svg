<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 320" width="750" height="320" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Developer -->
  <circle cx="60" cy="130" r="20" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="150" x2="60" y2="200" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="170" x2="35" y2="185" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="170" x2="85" y2="185" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="200" x2="35" y2="230" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="200" x2="85" y2="230" stroke="#333" stroke-width="2"/>
  <text x="60" y="255" text-anchor="middle" font-size="13" fill="#333">Developer</text>

  <!-- IDE with LLM -->
  <rect x="140" y="60" width="200" height="190" rx="8" fill="#e8eaf6" stroke="#3F51B5" stroke-width="2"/>
  <text x="240" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#283593">IDE + LLM</text>
  <rect x="160" y="105" width="160" height="35" rx="5" fill="#fff" stroke="#9FA8DA" stroke-width="1.5"/>
  <text x="240" y="127" text-anchor="middle" font-size="12" fill="#303F9F">AI Agent / Copilot</text>
  <rect x="160" y="150" width="160" height="35" rx="5" fill="#fff" stroke="#9FA8DA" stroke-width="1.5"/>
  <text x="240" y="172" text-anchor="middle" font-size="12" fill="#303F9F">MCP Client</text>
  <rect x="160" y="195" width="160" height="40" rx="5" fill="#e3f2fd" stroke="#64B5F6" stroke-width="1.5"/>
  <text x="240" y="212" text-anchor="middle" font-size="11" fill="#1565C0">MCP Server</text>
  <text x="240" y="227" text-anchor="middle" font-size="10" fill="#888">(e.g. vibing-steampunk)</text>

  <!-- Arrow: Developer to IDE -->
  <line x1="95" y1="155" x2="135" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <!-- Arrow: MCP Server to SAP -->
  <line x1="345" y1="155" x2="440" y2="155" stroke="#555" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="393" y="143" text-anchor="middle" font-size="11" fill="#888">ADT REST</text>
  <text x="393" y="158" text-anchor="middle" font-size="11" fill="#888">APIs</text>

  <!-- MCP Protocol arrow -->
  <line x1="240" y1="185" x2="240" y2="192" stroke="#3F51B5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="320" y="193" text-anchor="end" font-size="10" fill="#3F51B5">MCP Protocol</text>

  <!-- SAP System -->
  <rect x="445" y="60" width="260" height="190" rx="8" fill="#fff3e0" stroke="#FF9800" stroke-width="2"/>
  <text x="575" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">SAP System (7.31+)</text>
  <rect x="465" y="110" width="220" height="35" rx="4" fill="#fff" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="575" y="132" text-anchor="middle" font-size="12" fill="#F57C00">ADT Backend Services</text>
  <rect x="465" y="155" width="220" height="35" rx="4" fill="#fff" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="575" y="177" text-anchor="middle" font-size="12" fill="#F57C00">ABAP Objects</text>
  <rect x="465" y="200" width="220" height="35" rx="4" fill="#fff" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="575" y="222" text-anchor="middle" font-size="12" fill="#F57C00">Transport System</text>

  <!-- Risk label -->
  <rect x="445" y="265" width="260" height="30" rx="4" fill="#ffebee" stroke="#ef5350" stroke-width="1.5"/>
  <text x="575" y="285" text-anchor="middle" font-size="12" fill="#c62828">Direct write access to system</text>
</svg>